{% extends "base.html" %}

{% block title %}Cecytos Web Services{% endblock %}

{% block content %}

<main>
    <form method="POST">
        <h2>Inicio de sesión</h2>

        <label for="name">Ingrese su nombre de usuario</label><br>
        <input type="text" name="name" id="name"><br>

        <label for="password">Ingrese su contraseña</label><br>
        <input type="password" name="password" id="password"><br>
        <div class="password-adds">
            <input type="checkbox" id="show-pass"><label for="show-pass">Mostrar contraseña</label>
        </div>

        <div class="buttons">
            <button class="button-generic" type="submit">Enviar</button>
            <a class="button-generic" href="{{ url_for('index') }}">Cancelar</a>
        </div>
        <div class="link">
            <a class="link" href="{{ url_for('singin') }}">No tengo cuenta registrarse</a>
        </div>
    </form>
</main>

{% endblock %}
